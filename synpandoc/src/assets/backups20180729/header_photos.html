<title>synBE博客</title>

<style type="text/css">
html {
background: url(bg/pattern.png) repeat;
}
#header{
color: #FFF;
text-align: center;
padding: 1em 0px;
border-bottom: 1px #808899 solid;
}
body {
background-size: 100% 6em;
margin: auto;
margin-top: 0em;
padding: 1em 0.5em 1em 0.5em;
width: auto;
border: 1px solid  #CED7EA;
font:12px/180% Arial, Helvetica, sans-serif, "新宋体";
color: black;
font-family: Verdana, sans-serif;
font-size: 100%;
line-height: 140%;
background-color:#222424;
box-shadow: 0px 0px 10px black;
}
*{margin:0;padding:0;list-style-type:none;}
img {
float: left;
}
/*焦点图*/
.mod18{width:auto;height:36em;margin:20px auto;position:relative;background:#f7f7f7;}
.mod18 .btn{position:absolute;width:15px;height:70px;top:10em;cursor:pointer;z-index:99;font-size:50px;font-weight:bold;}
.mod18 .prev{left:0;background:url(images/prevBtn.png) no-repeat;}
.mod18 #prevTop,.mod18 #nextTop{top:213px;width:46px;height:48px;}
.mod18 #prevTop{background:url(images/prevBtnTop.png) 0 0 no-repeat;}
.mod18 #nextTop{background:url(images/nextBtnTop.png) 0 0 no-repeat;}
.mod18 .next{right:0;background:url(images/nextBtn.png) no-repeat;}
.mod18 li{float:left;}
.mod18 .cf li , .mod18 ul li{position:relative;color:#fff;}
.mod18 .cf a{display:block;width:680px;height:330px;position:absolute;color:#fff;}
.mod18 .cf li span{display:block;width:640px;position:absolute;left:0;bottom:0;padding:10px 20px;line-height:22px;text-align:left;background:rgba(0,0,0,0.6);filter:progid:DXImageTransform.Microsoft.gradient( GradientType = 0,startColorstr = "#60000000",endColorstr = "#60000000");}
.mod18 .picBox{height:31em;position:relative;overflow:hidden;}
.mod18 .picBox ul {width:1024px;height:31em;position:absolute;}
.mod18 .picBox li{width:1024px;height:31em;background: #222424;color: #EAEAEA;}
.mod18 .picBox img{width:auto;height:31em;}
.mod18 .listBox{width:auto;height:100px;margin:0 auto;position:relative;padding:6px 0 10px;overflow:hidden;}
.mod18 .listBox ul{height:5em;position:absolute;}
.mod18 .listBox li{width:129px;height:70px;cursor:pointer;position:relative;}
.mod18 .listBox li i{display:none;}
.mod18 .listBox li a{display:block;width:124px;height:70px;}
.mod18 .listBox li img{width:124px;height:70px;}
.mod18 .listBox .on img{width:118px;height:64px;border:3px solid #ff6600;}
.mod18 .listBox .on i{display:block;}
@media screen and (max-width: 736px) {
body {
width: auto;
border: none;
}
}
}

@media screen and (min-width: 737px) and (max-width: 1220px) {
body {width: 97%;
}
}

@media screen and (min-width: 1221px) {
body {width: 1024px;
}
}
/*
iPhone 4 3.5吋 320x480
iPhone 5 4.0吋 320x568
iPhone 6 4.7吋 375x667
iPhone 6+ 5.5吋 414x736
*/
</style>
