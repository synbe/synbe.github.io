<h1 class="title">使用jquery.qrcode生成二维码</h1>

<head>
<meta charset="utf-8"/> <!--<base target="_blank">-->
<script src="./js/qrcode.js"></script>
<style>
#qrcode{
border: 2px solid #D3E4E0;
background: none repeat scroll 0% 0% #E8F3E8;
padding: 2em;
}

#qrcode:hover{
border:1px solid white;
}
#qrcode img:hover{
border:1px solid yellow;
}
#qrcode img{
margin:auto;
}
#getval {
width:16em;
height:100px;
word-break:break-all;
}
</style>
</head>

<hr />
<p align="center"><textarea name="input" "type="text" id="getval"  placeholder="请输入文字或者网址，然后点击生成二维码按钮"/"></textarea> </p>
<p align="center"><button id="send">
生成二维码
</button></p>


<div id="qrcode"></div>

<script>
    window.onload =function(){
        var qrcode = new QRCode(document.getElementById("qrcode"), {
            width : 200,//设置宽高
            height : 200,
        });
        qrcode.makeCode("http://www.synbe.com");
        document.getElementById("send").onclick =function(){
            qrcode.makeCode(document.getElementById("getval").value);
        }
    }

</script>

<p><em><sub>参考:</sub></em> <a href="https://github.com/jeromeetienne/jquery-qrcode">jquery-qrcode</a> <a href="http://www.qrcode.com/zh">qrcode</a> <a href="http://jquery.com/">jqurey</a></p>
