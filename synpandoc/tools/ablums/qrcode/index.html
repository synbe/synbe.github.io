<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" id="viewport" name="viewport">
<title>使用jquery.qrcode生成二维码</title>
<script src="./js/qrcode.js"></script>
<style type="text/css">
html {
}
body {
margin:auto;
padding: 1em 0.5em 1em 0.5em;
border: 1px solid  #CED7EA;
}
code {
background: #DCDDE3;
color: #000;
margin: 10px 0px;
border-radius: 3px;
overflow: auto;
word-wrap: break-word;
font-family: Monaco, "DejaVu Sans Mono", "Courier New", monospace;
font-size: 1em;
}
pre {
white-space: pre;
background: #DCDDE3;
color: #000;
margin: 10px 0px;
padding: 0.5em;
border: 1px solid #8A9E7D;
border-radius: 3px;
background-clip: padding-box;
overflow: auto;
word-wrap: break-word;
font-family: Monaco, "DejaVu Sans Mono", "Courier New", monospace;
font-size: 1em;
color: #0A1B66;
}
a {
text-decoration: none;
}
a:hover {
color: #502505;
text-decoration: underline;
}
hr{
color:#dbd6d6;
}
img {
display: block;
margin: 0 auto;
float: center;
border: 1px solid #fff;
border-radius: 4px;
max-width: 100%;
}
ol {
list-style-type: decimal;
}
ul {
text-decoration: none;
}
li {
color: black
}
table {
color: #613A00;
background: linear-gradient(#FFE3C8, #F5DAC0) repeat scroll 0% 0% transparent;
border: 1px solid #DCA874;
position: relative;
margin: 0px auto;
padding: 0;
font-size: 95%;
border-radius: 3px;
box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.1);
text-shadow: 0px 1px 0px #FFF;
font: inherit;
vertical-align: baseline;
}
thead {
}
tbody {
}
tr {
}
table tr td {
}
table tr:nth-child(2n) {
background-color: #FAFAFA;
}
td {
}
h1,h2,h3,h4,h5,h6{
color: #000;
font-weight: bold;
font-size: 24px;
}
h1{
text-align: center;
color: #FFF;
line-height: 2em;
font-weight: bold;
font-size: 2em;
margin: -0.6em -0.3em 1em -0.3em;
padding:0 1em;
background-image: linear-gradient(to bottom, #237bb3 0px, #3da6e9 100%);
}
h2 {
font-size: 1.9em;
}
h3 {
font-size: 1.7em;
}
h4 {
font-size: 1.5em;
}
h5 {
font-size: 1.3em;
}
h6 {
font-size: 1.1em;
border-bottom: 1px solid #dbd6d6;
}
blockquote {
padding: 0.5em;
font-weight:500;
color: #fff;
border: 2px solid #fff;
border-radius: 6px;
box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.1);
margin: 10px;
background: #777;
}
blockquote blockquote {
margin: -10px;
background:#337ab7;
}
blockquote blockquote  blockquote {
margin: -10px;
background: #5cb85c;
}

blockquote blockquote  blockquote blockquote {
margin: -10px;
background:#f0ad4e;
}
blockquote blockquote  blockquote blockquote blockquote {
margin: -10px;
background:#f32721;
}
blockquote blockquote  blockquote blockquote blockquote blockquote {
margin: -10px;
background:#5bc0de;
}

@media screen and (max-width:767px) {
body {
padding: 1em 0.5em 1em 0.5em;
}
}
@media screen and (min-width:737px) and (max-width:1220px) {
body {
width: 97%;
}
}
@media screen and (min-width:1221px) {
body {
width: 1024px;
}
}
</style>
<style>
#qrcode{
border: 2px solid #D3E4E0;
padding: 2em;
}
img{
margin:0 auto;
}
#getval {
width:100%;
height:100px;
word-break:break-all;
}
</style>
</head>
<body>
<h1>生成二维码</h1>
<p align="center">
<textarea name="input" "type="text" id="getval"  placeholder="请输入文字或者网址，然后点击生成二维码按钮"/"></textarea>
</p>
<p align="center">
<button id="send">
生成二维码
</button></p>
<div id="qrcode"></div>
<script>
window.onload =function(){
var qrcode = new QRCode(document.getElementById("qrcode"), {
width : 300,//设置宽高
height : 300,
});
qrcode.makeCode("http://www.synbe.com");
document.getElementById("send").onclick =function(){
qrcode.makeCode(document.getElementById("getval").value);
}
}
</script>
<p>使用jquery.qrcode生成二维码</p>
</body>
</html>
